name: uv
adopt-info: uv
base: ubuntu@24.04
summary: An extremely fast Python package and project manager
description: |
  This SDK provides uv and uvx for Python package and project management.
  Manages a shared virtual environment via a slot and aliases pip to uv pip
  for compatibility. Package cache is persisted on the host to speed up
  dependency installations across workshop updates.
license: Apache-2.0 OR MIT
platforms:
  amd64:
  arm64:

parts:
  uv:
    plugin: rust
    source: .
    override-pull: |
      VERSION=$(cat "$CRAFT_PROJECT_DIR/VERSION")
      craftctl set version="$VERSION"
      git clone --depth 1 --branch "$VERSION" https://github.com/astral-sh/uv.git .
      craftctl default
    organize:
      uv: bin/uv
      uvx: bin/uvx
    prime:
      - bin/uv
      - bin/uvx

plugs:
  cache:
    interface: mount
    workshop-target: /home/workshop/.cache/uv

slots:
  venv:
    interface: mount
    workshop-source: /home/workshop/uv-venv
