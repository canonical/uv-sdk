name: Build and Upload SDK

on:
  push:
    branches:
      - "[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch name (e.g., 0.9)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-upload-amd64:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    with:
      platforms: '["amd64"]'
      track: latest
      risk: stable
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_STAGING }}
  build-and-upload-arm64:
    uses: canonical/sdkcraft-actions/.github/workflows/upload.yml@main
    with:
      platforms: '["arm64"]'
      runs-on: '["self-hosted-linux-arm64-noble-xlarge"]'
      track: latest
      risk: stable
    secrets:
      SDKCRAFT_STORE_CREDENTIALS: ${{ secrets.SDKCRAFT_STORE_CREDENTIALS_STAGING }}
